<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>志工服務中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary-color: #00B900; --bg-color: #F4F7F6; --text-color: #333333; --secondary-text: #777777; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; padding: 20px 0 10px; }
        .logo-placeholder { font-size: 40px; margin-bottom: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin: 0; }
        .header p { font-size: 14px; margin: 5px 0 0; color: var(--secondary-text); }
        
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 綁定表單與打卡 UI (與上一版相同，簡化顯示) */
        .bind-card, .form-section, .profile-card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .bind-input, select, input[type="text"], input[type="number"], input[type="datetime-local"] { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .bind-btn { background-color: var(--text-color); color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold;}
        .checkin-btn { background-color: var(--primary-color); color: white; border: none; width: 150px; height: 150px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0, 185, 0, 0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto; }
        .status-area { background-color: #ffffff; border-radius: 12px; padding: 15px; box-shadow: var(--shadow); font-size: 14px; margin-top: 20px;}
        .profile-card { display: flex; align-items: center; }
        .profile-card img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }

        /* 館員後台專屬樣式 */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admin-header h2 { margin: 0; font-size: 18px; }
        .refresh-btn { background: #eeeeee; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-size: 14px; }
        
        .record-card { background: white; border-radius: 12px; padding: 15px; box-shadow: var(--shadow); margin-bottom: 15px; border-left: 5px solid #ffc107; }
        .record-card.sign-in { border-left-color: #00B900; }
        .record-card.sign-out { border-left-color: #ff4d4f; }
        
        .record-title { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .record-tag { font-size: 12px; background: #eee; padding: 3px 8px; border-radius: 10px; }
        
        .approve-btn { background-color: var(--text-color); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* 彈出視窗 */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; z-index: 1000; }
        .result-overlay.show { opacity: 1; visibility: visible; }
        .result-card { background-color: #ffffff; border-radius: 16px; padding: 30px; text-align: center; width: 80%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-placeholder">📍</div>
            <h1>志工服務中心</h1>
            <p id="systemSubtitle">系統連線中...</p>
        </div>

        <div id="sectionLoading" class="section active" style="text-align: center;">
            <p>正在驗證您的身分，請稍候 ⏳</p>
        </div>

        <div id="sectionBind" class="section">
            <div class="bind-card">
                <h2 style="margin-top:0;">身分驗證</h2>
                <input type="tel" id="phoneInput" class="bind-input" placeholder="請輸入建檔手機號碼" maxlength="10">
                <button id="bindBtn" class="bind-btn">立即綁定</button>
            </div>
        </div>

        <div id="sectionCheckIn" class="section">
            <div class="profile-card">
                <img src="" alt="頭像" id="userAvatar">
                <div class="profile-info">
                    <h2 id="userName">您好，志工</h2>
                    <p id="userRole"></p>
                </div>
            </div>
            <div class="form-section">
                <label style="font-weight: bold; display: block;">📋 服務內容：</label>
                <select id="serviceSelect">
                    <option value="活動">活動</option>
                    <option value="特色空間">特色空間</option>
                    <option value="導覽">導覽</option>
                </select>
                <label style="font-weight: bold; display: block; margin-top:10px;">⏱️ 打卡狀態：</label>
                <div style="display: flex; gap: 20px; margin-top: 5px;">
                    <label><input type="radio" name="checkType" value="簽到" checked> 簽到</label>
                    <label><input type="radio" name="checkType" value="簽退"> 簽退</label>
                </div>
            </div>
            <div class="action-card">
                <button class="checkin-btn" id="checkInBtn">
                    <span style="font-size: 40px;">📍</span>
                    <span id="checkInBtnText">點我打卡</span>
                </button>
            </div>
       <div class="status-area">
                <div style="font-weight: bold; margin-bottom: 10px; color: var(--secondary-text);">📢 系統狀態</div>
                <div id="statusMsg">準備就緒。</div>
            </div>
            </div>

        <div id="sectionAdmin" class="section">
            <div class="profile-card" style="margin-bottom: 15px; padding: 15px;">
                <div>
                    <h2 id="staffName" style="margin: 0; font-size: 18px;">館員您好</h2>
                    <p id="adminRole" style="margin: 3px 0 0; font-size: 13px; color: var(--secondary-text);">管理員模式已啟動</p>
                </div>
            </div>
            
            <div class="admin-header">
                <h2>📋 待審核清單</h2>
                <button class="refresh-btn" onclick="fetchPendingRecords()">🔄 重新整理</button>
            </div>
            <div id="adminRecordsContainer">
                <p style="text-align:center; color:gray;">載入資料中...</p>
            </div>
        </div>

    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div id="resultIcon"></div>
            <div id="resultStatus" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="resultDistance" style="white-space: pre-line; margin-bottom: 20px; font-size: 14px;"></div>
            <button class="bind-btn" onclick="document.getElementById('resultOverlay').classList.remove('show');">關閉</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008914129-7KGP9Yxy"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwbnCirrFwG8mt7CBFbOP-_HMlzgBiA9d08iZYMHHjyAnRo2hrPII77qPWFX7s_3mAO/exec"; 

        let currentUserId = "";
        let dbUserName = ""; 
        const froggySuccessImg = `<img src="DK1.png" alt="成功" style="height:100px; margin-bottom:15px;">`;
        const froggyErrorImg = `<img src="DK2.png" alt="失敗" style="height:100px; margin-bottom:15px;">`;

        async function initializeApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                currentUserId = profile.userId;
                document.getElementById('userAvatar').src = profile.pictureUrl;
                
                checkBindingStatus();
            } catch (err) { alert("LIFF 初始化失敗"); }
        }

        // 📍 輔助函數：處理職稱顯示邏輯
        function formatRoleDisplay(group, title) {
            if (!title && !group) return "準備執勤中";
            
            let displayTitle = title;
            // 貼心設計：拿掉「一般」兩字
            if (title === "一般志工") {
                displayTitle = "志工";
            }
            
            // 組織架構設計：大隊長的專屬顯示方式
            if (title === "大隊長") {
                return `大隊長 (所屬：${group})`;
            } else {
                return `${group} - ${displayTitle}`;
            }
        }

        // 📍 1. 替換 checkBindingStatus 函數 (讓它能把 group 和 title 傳給館員介面)
        function checkBindingStatus() {
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "checkBinding", userId: currentUserId })
            }).then(res => res.json()).then(result => {
                if (result.status === "bound") {
                    dbUserName = result.name;
                    if (result.role === "staff") {
                        // 📍 帶入組別與職稱
                        setupAdminUI(result.group, result.title); 
                    } else {
                        setupCheckInUI(result.group, result.title);
                    }
                } else {
                    switchSection(document.getElementById('sectionBind'));
                    document.getElementById('systemSubtitle').innerText = "首次使用驗證";
                }
            });
        }

        // 📍 2. 替換 bindBtn 點擊事件 (同上，綁定成功時也要傳遞參數)
        document.getElementById('bindBtn').addEventListener('click', () => {
            const phone = document.getElementById('phoneInput').value;
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "bindAccount", userId: currentUserId, phone: phone })
            }).then(res => res.json()).then(result => {
                if (result.status === "success") {
                    dbUserName = result.name;
                    alert("綁定成功！歡迎，" + dbUserName);
                    if (result.role === "staff") {
                        // 📍 帶入組別與職稱
                        setupAdminUI(result.group, result.title); 
                    } else {
                        setupCheckInUI(result.group, result.title);
                    }
                } else alert(result.message);
            });
        });

        // --- 志工打卡 UI ---
        function setupCheckInUI(group, title) {
            switchSection(document.getElementById('sectionCheckIn'));
            document.getElementById('systemSubtitle').innerText = "定位打卡系統";
            document.getElementById('userName').innerText = dbUserName;
            // 📍 顯示轉換後的組別與職稱
            document.getElementById('userRole').innerText = formatRoleDisplay(group, title);
        }

        // 📍 更新：打卡按鈕事件 (在主畫面顯示精美收據)
        document.getElementById('checkInBtn').addEventListener('click', () => {
            const btn = document.getElementById('checkInBtn');
            const btnText = document.getElementById('checkInBtnText');
            const statusMsg = document.getElementById('statusMsg'); // 主畫面下方的狀態區塊
            
            btn.disabled = true; 
            btnText.innerText = "定位中...";
            statusMsg.innerHTML = "正在取得 GPS 定位，請稍候...";
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const checkType = document.querySelector('input[name="checkType"]:checked').value;
                    const serviceType = document.getElementById('serviceSelect').value;
                    
                    statusMsg.innerHTML = "定位成功，資料傳送中...";

                    fetch(GAS_URL, {
                        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                        body: JSON.stringify({
                            action: "checkIn", userId: currentUserId, lat: pos.coords.latitude, lng: pos.coords.longitude,
                            serviceType: serviceType,
                            checkType: checkType
                        })
                    }).then(res => res.json()).then(result => {
                        if (result.status === "success") {
                            const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false }); 
                            const distanceInfo = result.distance !== undefined ? `\n📏 距離：${result.distance} 公尺` : "";
                            
                            // 給彈出視窗的訊息
                            const detailMsg = `👤 姓名：${dbUserName}\n📋 服務：${serviceType}\n⏱️ 狀態：${checkType}${distanceInfo}\n⏰ 時間：${timeStr}`;
                            
                            // 📍 給主畫面下方的「精美明細卡片」
                            const mainHtml = `
                                <div style="color: #00B900; font-weight: bold; font-size: 16px; margin-bottom: 10px;">✅ 打卡成功明細</div>
                                <div style="background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #bbf7d0; font-size: 15px; line-height: 1.8; color: #166534; text-align: left;">
                                    <div><b>👤 姓名：</b>${dbUserName}</div>
                                    <div><b>📋 服務：</b>${serviceType}</div>
                                    <div><b>⏱️ 狀態：</b>${checkType}</div>
                                    ${result.distance !== undefined ? `<div><b>📏 距離：</b>${result.distance} 公尺</div>` : ""}
                                    <div style="margin-top: 5px; border-top: 1px dashed #86efac; padding-top: 5px;">
                                        <b>⏰ 時間：</b><span style="font-weight: bold; font-size: 16px;">${timeStr}</span>
                                    </div>
                                </div>
                            `;
                            
                            showPopup(true, "打卡成功！", detailMsg);
                            statusMsg.innerHTML = mainHtml; // 將卡片寫入主畫面
                            
                        } else {
                            showPopup(false, "打卡失敗", result.message);
                            statusMsg.innerHTML = `<span style="color:#ff4d4f; font-weight:bold;">❌ 打卡失敗：</span><br>${result.message}`;
                        }
                        btn.disabled = false; btnText.innerText = "點我打卡";
                    });
                },
                (err) => { 
                    showPopup(false, "定位失敗", "請確認手機已開啟位置權限。"); 
                    statusMsg.innerHTML = `<span style="color:#ff4d4f; font-weight:bold;">❌ 定位失敗：</span>請確認手機已開啟位置權限。`;
                    btn.disabled = false; btnText.innerText = "點我打卡"; 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        });

        // 📍 3. 替換 setupAdminUI 函數 (加入館員專屬的文字轉換邏輯)
        function setupAdminUI(group, title) {
            switchSection(document.getElementById('sectionAdmin'));
            document.getElementById('systemSubtitle').innerText = "館員管理中心";
            document.getElementById('staffName').innerText = "您好，" + dbUserName;
            
            // 📍 新增：處理館員職稱顯示邏輯
            let displayRole = "管理員模式已啟動"; // 預設防呆文字
            if (group && title) {
                if (title === "系統管理員") {
                    displayRole = `系統管理員 (所屬：${group})`;
                } else {
                    displayRole = `${group} - ${title}`; // 例如：推廣組 - 志工管理員
                }
            }
            document.getElementById('adminRole').innerText = displayRole;

            fetchPendingRecords();
        }

        function fetchPendingRecords() {
            const container = document.getElementById('adminRecordsContainer');
            container.innerHTML = '<p style="text-align:center; color:gray;">撈取資料中...</p>';
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getPendingRecords" })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    container.innerHTML = "";
                    if (result.data.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#00B900; font-weight:bold;">🎉 目前沒有待審核的紀錄！</p>';
                        return;
                    }
                    result.data.forEach(record => {
                        const card = document.createElement('div');
                        const isSignIn = record.checkType === '簽到';
                        const borderColorClass = isSignIn ? 'sign-in' : 'sign-out';
                        card.className = `record-card ${borderColorClass}`;
                        
                        const timeLabel = isSignIn ? '簽到時間' : '簽退時間';
                        const [datePart, timePart] = record.timestamp.split('T');
                        const displayDate = datePart.replace(/-/g, '/'); 
                        
                        // 📍 核心修改：依據簽到退狀態，設定不同的區塊顏色與文字顏色
                        // 簽到：淡綠配暗綠。簽退：淡粉配暗紅。
                        const styles = isSignIn 
                            ? { bg: '#f0fdf4', border: '#bbf7d0', text: '#166534', input: '#00B900' }
                            : { bg: '#fff1f0', border: '#ffa39e', text: '#a8071a', input: '#ff4d4f' };
                        
                        const multiplierHtml = isSignIn 
                            ? `<div style="flex:1;">
                                   <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">加權：</label>
                                   <input type="number" id="mul_${record.uuid}" value="1" step="0.5" min="1" style="margin:0; padding:8px;">
                               </div>`
                            : `<input type="hidden" id="mul_${record.uuid}" value="1">`; 
                        
                        card.innerHTML = `
                            <div class="record-title">
                                <span>👤 ${record.volunteerName}</span>
                                <span class="record-tag">${record.checkType}</span>
                            </div>
                            <div style="font-size:14px; margin-bottom:12px; color:#555;">📍 服務內容：${record.serviceType}</div>
                            
                            <div style="font-size:14px; margin-bottom:15px; background: ${styles.bg}; padding: 12px; border-radius: 8px; border: 1px solid ${styles.border}; display: flex; align-items: center; flex-wrap: wrap; gap: 5px;">
                                <span style="font-weight:bold; color:${styles.text};">🕒 ${timeLabel}：</span> 
                                <span style="color:${styles.text}; margin-right: 5px;">${displayDate}</span>
                                
                                <input type="time" id="timeOnly_${record.uuid}" data-date="${datePart}" data-original-time="${timePart}" value="${timePart}" 
                                    onchange="if(this.value === '') this.value = this.getAttribute('data-original-time');"
                                    style="border: 1px solid ${styles.input}; color: ${styles.input}; font-weight: bold; font-size: 16px; background: white; padding: 4px 8px; border-radius: 6px; cursor: pointer; width: auto; margin:0; outline: none;">
                            </div>
                            
                            <div style="display:flex; gap:10px; align-items: flex-end; margin-bottom: 15px;">
                                ${multiplierHtml}
                                <div style="flex:2;">
                                    <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">館員備註：</label>
                                    <input type="text" id="rem_${record.uuid}" placeholder="選填" style="margin:0; padding:8px;">
                                </div>
                            </div>
                            
                            <button class="approve-btn" onclick="approveRecord('${record.uuid}')">✅ 確認核准</button>
                        `;
                        container.appendChild(card);
                    });
                }
            });
        }

        function approveRecord(uuid) {
            // 📍 核心修改 4：重新組合 日期 + 時間
            const timeInput = document.getElementById(`timeOnly_${uuid}`);
            const datePart = timeInput.getAttribute('data-date'); // 抓回隱藏的日期 (例如 2026-03-21)
            const timePart = timeInput.value;                     // 抓取畫面上選定的時間 (例如 14:30)
            const newTime = `${datePart}T${timePart}`;            // 組合回 GAS 要的格式
            
            const multiplier = document.getElementById(`mul_${uuid}`).value;
            const remark = document.getElementById(`rem_${uuid}`).value;
            
            const btn = event.target;
            btn.disabled = true; btn.innerText = "處理中...";

            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ 
                    action: "approveRecord", uuid: uuid, newTime: newTime, multiplier: multiplier, remark: remark, staffName: dbUserName
                })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    fetchPendingRecords(); // 重新撈取清單
                } else {
                    alert(result.message);
                    btn.disabled = false; btn.innerText = "✅ 確認核准";
                }
            });
        }

        // --- 共用輔助 ---
        function switchSection(targetSection) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            targetSection.classList.add('active');
        }
        // --- 修正 showPopup 函數 ---
        // 確保彈出視窗不會意外覆蓋到我們剛精心設計的主畫面狀態
        function showPopup(isSuccess, title, msg) {
            document.getElementById('resultIcon').innerHTML = isSuccess ? froggySuccessImg : froggyErrorImg;
            document.getElementById('resultStatus').innerText = title;
            document.getElementById('resultDistance').innerText = msg;
            document.getElementById('resultOverlay').classList.add('show');
        }
        initializeApp();
    </script>
</body>
</html>
