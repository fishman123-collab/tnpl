<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>志工服務中心</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 基礎樣式維持不變 */
        :root { --primary-color: #00B900; --bg-color: #F4F7F6; --text-color: #333333; --secondary-text: #777777; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px 0; }
        .logo-placeholder { font-size: 40px; margin-bottom: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin: 0; }
        .header p { font-size: 14px; margin: 5px 0 0; color: var(--secondary-text); }
        
        /* 區塊顯示控制 */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 綁定表單專屬樣式 */
        .bind-card { background: white; padding: 25px; border-radius: 16px; box-shadow: var(--shadow); text-align: center; }
        .bind-input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; letter-spacing: 2px;}
        .bind-btn { background-color: var(--text-color); color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold;}
        .bind-btn:disabled { background-color: #ccc; }

        /* 打卡畫面專屬樣式 (保留原本的美化設計) */
        .profile-card { background-color: #ffffff; border-radius: 16px; padding: 20px; display: flex; align-items: center; box-shadow: var(--shadow); margin-bottom: 25px; }
        .profile-card img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; border: 2px solid #eaeaea; }
        .profile-info h2 { font-size: 18px; margin: 0; font-weight: 600; }
        .profile-info p { font-size: 14px; margin: 3px 0 0; color: var(--secondary-text); }
        .form-section { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow); text-align: left; }
        .action-card { text-align: center; }
        .checkin-btn { background-color: var(--primary-color); color: white; border: none; width: 150px; height: 150px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0, 185, 0, 0.3); transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto; }
        .checkin-btn:disabled { background-color: #cccccc; box-shadow: none; cursor: not-allowed; }
        .status-area { margin-top: 30px; background-color: #ffffff; border-radius: 12px; padding: 15px; box-shadow: var(--shadow); font-size: 14px; line-height: 1.6; }
        
        /* 彈出視窗 */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; }
        .result-overlay.show { opacity: 1; visibility: visible; }
        .result-card { background-color: #ffffff; border-radius: 16px; padding: 30px; text-align: center; width: 80%; max-width: 320px; }
        .result-image { height: 120px; width: auto; max-width: 100%; margin-bottom: 15px; }
        .result-close { background-color: var(--text-color); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-placeholder">📍</div>
            <h1>志工服務中心</h1>
            <p id="systemSubtitle">系統連線中...</p>
        </div>

        <div id="sectionLoading" class="section active" style="text-align: center;">
            <p>正在驗證您的身分，請稍候 ⏳</p>
        </div>

        <div id="sectionBind" class="section">
            <div class="bind-card">
                <h2 style="margin-top:0;">身分驗證</h2>
                <p style="color:var(--secondary-text); font-size:14px; text-align:left;">歡迎初次使用！為確保系統安全，請輸入您在建檔時留存的手機號碼進行帳號綁定。</p>
                <input type="tel" id="phoneInput" class="bind-input" placeholder="例如：0912345678" maxlength="10">
                <button id="bindBtn" class="bind-btn">立即綁定</button>
            </div>
            <div class="status-area" id="bindStatusArea" style="display:none;">
                <div class="status-title">📢 系統訊息</div>
                <div class="status-msg" id="bindStatusMsg"></div>
            </div>
        </div>

        <div id="sectionCheckIn" class="section">
            <div class="profile-card" id="profileCard">
                <img src="" alt="頭像" id="userAvatar">
                <div class="profile-info">
                    <h2 id="userName">您好，志工</h2>
                    <p>準備執勤中</p>
                </div>
            </div>

            <div class="form-section">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">📋 服務內容：</label>
                    <select id="serviceSelect" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
                        <option value="活動">活動</option>
                        <option value="特色空間">特色空間</option>
                        <option value="導覽">導覽</option>
                    </select>
                </div>
                <div>
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">⏱️ 打卡狀態：</label>
                    <div style="display: flex; gap: 20px;">
                        <label style="font-size: 16px; cursor: pointer;"><input type="radio" name="checkType" value="簽到" checked style="transform: scale(1.3); margin-right: 5px;"> 簽到</label>
                        <label style="font-size: 16px; cursor: pointer;"><input type="radio" name="checkType" value="簽退" style="transform: scale(1.3); margin-right: 5px;"> 簽退</label>
                    </div>
                </div>
            </div>

            <div class="action-card">
                <button class="checkin-btn" id="checkInBtn">
                    <span style="font-size: 40px; margin-bottom: 8px;">📍</span>
                    <span class="text" id="checkInBtnText">點我打卡</span>
                </button>
            </div>

            <div class="status-area">
                <div class="status-title">📢 系統狀態</div>
                <div class="status-msg" id="statusMsg">準備就緒。</div>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div id="resultIcon"></div>
            <div id="resultStatus" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="resultDistance" style="font-size: 14px; color: var(--secondary-text); white-space: pre-line;"></div>
            <button class="result-close" id="resultCloseBtn">關閉</button>
        </div>
    </div>

    <script>
        // 直接套用您提供的專屬設定
        const LIFF_ID = "2008914129-7KGP9Yxy"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwbnCirrFwG8mt7CBFbOP-_HMlzgBiA9d08iZYMHHjyAnRo2hrPII77qPWFX7s_3mAO/exec"; 

        let currentUserId = "";
        let currentProfile = null;

        const secLoading = document.getElementById('sectionLoading');
        const secBind = document.getElementById('sectionBind');
        const secCheckIn = document.getElementById('sectionCheckIn');
        const sysSubtitle = document.getElementById('systemSubtitle');

        const froggySuccessImg = `<img src="DK1.png" alt="成功" class="result-image">`;
        const froggyErrorImg = `<img src="DK2.png" alt="失敗" class="result-image">`;

        // ==========================================
        // 1. 系統初始化與身分檢查
        // ==========================================
        async function initializeApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                currentProfile = await liff.getProfile();
                currentUserId = currentProfile.userId;
                
                // 向後端確認是否已經綁定
                checkBindingStatus();
                
            } catch (err) {
                alert("LIFF 初始化失敗：" + err.message);
            }
        }

        function checkBindingStatus() {
            fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "checkBinding", userId: currentUserId })
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === "bound") {
                    // 已綁定，進入打卡畫面
                    setupCheckInUI(result.name, result.role);
                } else {
                    // 未綁定，顯示綁定表單
                    switchSection(secBind);
                    sysSubtitle.innerText = "首次使用驗證";
                }
            })
            .catch(err => alert("連線錯誤，請重新開啟。"));
        }

        // ==========================================
        // 2. 處理帳號綁定
        // ==========================================
        document.getElementById('bindBtn').addEventListener('click', () => {
            const phone = document.getElementById('phoneInput').value;
            if (phone.length < 9) { alert("請輸入完整的手機號碼！"); return; }
            
            document.getElementById('bindBtn').disabled = true;
            document.getElementById('bindBtn').innerText = "驗證中...";

            fetch(GAS_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "bindAccount", userId: currentUserId, phone: phone })
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === "success") {
                    alert("✅ 綁定成功！歡迎加入，" + result.name);
                    setupCheckInUI(result.name, result.role);
                } else {
                    document.getElementById('bindStatusArea').style.display = "block";
                    document.getElementById('bindStatusMsg').innerText = "❌ " + result.message;
                    document.getElementById('bindBtn').disabled = false;
                    document.getElementById('bindBtn').innerText = "重新驗證";
                }
            }).catch(err => {
                alert("連線失敗，請重試。");
                document.getElementById('bindBtn').disabled = false;
                document.getElementById('bindBtn').innerText = "立即綁定";
            });
        });

        // ==========================================
        // 3. 處理打卡畫面與邏輯
        // ==========================================
        function setupCheckInUI(dbName, role) {
            switchSection(secCheckIn);
            sysSubtitle.innerText = "定位打卡系統";
            document.getElementById('userAvatar').src = currentProfile.pictureUrl;
            document.getElementById('userName').innerText = dbName; // 顯示資料庫內的本名

            // 簽退時鎖定服務內容選單
            const checkTypeRadios = document.querySelectorAll('input[name="checkType"]');
            const serviceSelect = document.getElementById('serviceSelect');
            checkTypeRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (e.target.value === '簽退') {
                        serviceSelect.disabled = true;
                        serviceSelect.style.backgroundColor = "#eeeeee";
                    } else {
                        serviceSelect.disabled = false;
                        serviceSelect.style.backgroundColor = "#ffffff";
                    }
                });
            });
        }

        document.getElementById('checkInBtn').addEventListener('click', () => {
            const btn = document.getElementById('checkInBtn');
            const btnText = document.getElementById('checkInBtnText');
            const statusMsg = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btnText.innerText = "定位中...";
            statusMsg.innerText = "正在取得 GPS 定位，請稍候...";

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        btnText.innerText = "傳送中...";
                        statusMsg.innerText = "定位成功，正在傳送資料...";
                        
                        const serviceType = document.getElementById('serviceSelect').value;
                        const checkType = document.querySelector('input[name="checkType"]:checked').value;

                        // 送出打卡請求 (包含 action: "checkIn")
                        fetch(GAS_URL, {
                            method: "POST",
                            headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                            body: JSON.stringify({
                                action: "checkIn",
                                userId: currentUserId,
                                lat: lat,
                                lng: lng,
                                serviceType: serviceType,
                                checkType: checkType
                            })
                        })
                        .then(res => res.json())
                        .then(result => {
                            if(result.status === "success") {
                                const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false }); 
                                showPopup(true, checkType + "成功！", result.message + "\n⏰ 時間：" + timeStr);
                            } else {
                                showPopup(false, "打卡失敗", result.message);
                            }
                            resetCheckInBtn();
                        })
                        .catch(err => { showPopup(false, "連線錯誤", "請確認網路連線。"); resetCheckInBtn(); });
                    },
                    (error) => { showPopup(false, "定位失敗", "請確認手機已開啟位置權限。"); resetCheckInBtn(); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                showPopup(false, "設備不支援", "您的裝置無法取得定位。"); resetCheckInBtn();
            }
        });

        // 輔助函數
        function switchSection(targetSection) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            targetSection.classList.add('active');
        }

        function showPopup(isSuccess, title, msg) {
            document.getElementById('resultIcon').innerHTML = isSuccess ? froggySuccessImg : froggyErrorImg;
            document.getElementById('resultStatus').innerText = title;
            document.getElementById('resultDistance').innerText = msg;
            document.getElementById('resultOverlay').classList.add('show');
            document.getElementById('statusMsg').innerText = msg;
        }

        document.getElementById('resultCloseBtn').addEventListener('click', () => {
            document.getElementById('resultOverlay').classList.remove('show');
        });

        function resetCheckInBtn() {
            document.getElementById('checkInBtn').disabled = false;
            document.getElementById('checkInBtnText').innerText = "點我打卡";
        }

        // 啟動程式
        initializeApp();
    </script>
</body>
</html>
